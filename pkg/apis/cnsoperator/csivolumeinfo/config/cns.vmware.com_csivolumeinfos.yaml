                - TRANSFERRING_TO_VM
                - VM_MANAGED
                - TRANSFERRING_TO_CSI
                type: string
              vmInstanceUUID:
                description: VMInstanceUUID is the instance UUID of the VM identified
                  by VMName. Empty when CSI-owned or snapshot-retained.
