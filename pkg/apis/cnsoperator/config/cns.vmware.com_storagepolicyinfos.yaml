    singular: storagepolicyinfo
  scope: Namespaced
  versions:
  - name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          StoragePolicyInfo is the Schema for the storagepolicyinfos API.
          Name of this CR is the same as the unique and immutable K8sCompliantName of the
          storage policy. One instance is created per namespace per storage policy that is
          assigned to that namespace.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: StoragePolicyInfoSpec defines the desired state of StoragePolicyInfo.
            properties:
              clusterStoragePolicyInfoRef:
                description: ClusterStoragePolicyInfoRef points to the corresponding
                  cluster-scoped ClusterStoragePolicyInfo.
                properties:
                  apiGroup:
                    description: APIGroup is the API group and version of the referenced
                      object, i.e. "cns.vmware.com/v1alpha1".
                    type: string
                  kind:
                    description: Kind is the kind of the referenced object, i.e. "ClusterStoragePolicyInfo".
