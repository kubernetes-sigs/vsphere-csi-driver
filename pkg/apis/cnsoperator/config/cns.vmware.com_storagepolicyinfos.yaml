---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.21.0
  name: storagepolicyinfos.cns.vmware.com
spec:
  group: cns.vmware.com
  names:
    kind: StoragePolicyInfo
    listKind: StoragePolicyInfoList
    plural: storagepolicyinfos
    shortNames:
    - spi
    singular: storagepolicyinfo
  scope: Namespaced
  versions:
  - name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          StoragePolicyInfo is the Schema for the storagepolicyinfos API.
          Name of this CR is the same as the unique and immutable K8sCompliantName of the
          storage policy. One instance is created per namespace per storage policy that is
          assigned to that namespace.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          status:
            description: StoragePolicyInfoStatus defines the observed state of StoragePolicyInfo.
            properties:
              error:
                description: |-
                  Error describes a failure condition when resolving topology for this
                  storage policy. Empty string indicates no error.
                type: string
              topologyInfo:
                description: |-
                  TopologyInfo contains observed topology for this storage policy filtered
                  to the zones accessible within this namespace.
                properties:
                  accessibleZones:
                    description: |-
                      AccessibleZones lists zones where the policy is accessible for this namespace.
                      For a marker policy (e.g. vSAN File Service), zones are shown even if they are
                      not assigned to the namespace.
                    items:
                      minLength: 1
                      type: string
                    type: array
                    x-kubernetes-list-type: set
                  topologyType:
                    description: |-
                      TopologyType describes the type of topology for the storage policy.
                      Valid values are empty string (no topology) or "zonal" (zone-based topology).
                    enum:
                    - ""
                    - zonal
                    type: string
                type: object
              volumeCapabilities:
                additionalProperties:
                  type: boolean
                description: VolumeCapabilities describes the supported volume capabilities.
                type: object
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
