                description: 'DiskUrlPath is the path to an existing block volume.
                  Accepts either the vCenter folder URL form
                  (https://<vc_ip>/folder/<path>?dcPath=<dc>&dsName=<ds>) or the
                  datastore path form ([<datastore>] <dir>/<file>.vmdk) used for
