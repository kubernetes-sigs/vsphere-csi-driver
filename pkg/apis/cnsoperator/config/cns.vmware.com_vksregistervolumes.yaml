metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.19.0
  name: vksregistervolumes.cns.vmware.com
spec:
  group: cns.vmware.com
  names:
    kind: VKSRegisterVolume
    listKind: VKSRegisterVolumeList
    plural: vksregistervolumes
    shortNames:
    - vksregvol
    singular: vksregistervolume
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
