name: Verify Security (govulncheck)

on:
  pull_request:
    paths:
      - 'go.mod'
      - 'go.sum'
      - 'tests/e2e/go.mod'
      - 'tests/e2e/go.sum'
      - '**.go'
      - 'hack/filter-vulns.py'
  push:
    branches:
      - master
      - main

jobs:
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v4
        with:
          go-version-file: 'go.mod'

      # Scan root module
      - name: Run govulncheck on root module
        id: govulncheck-root
        uses: golang/govulncheck-action@v1
        with:
          go-version-input: '1.26'
          go-package: './...'
          output-format: 'json'
          output-file: 'vuln-root.json'
        continue-on-error: true

      # Scan tests/e2e module
      - name: Run govulncheck on tests/e2e module
        id: govulncheck-e2e
        uses: golang/govulncheck-action@v1
        with:
          go-version-input: '1.26'
          work-dir: 'tests/e2e'
          go-package: './...'
          output-format: 'json'
          output-file: '../vuln-e2e.json'
        continue-on-error: true

      # Filter results by CVSS score (default threshold: 5.0)
      - name: Filter vulnerabilities by CVSS score
        env:
          CVSS_THRESHOLD: '5.0'
        run: |
          python3 hack/filter-vulns.py $CVSS_THRESHOLD vuln-root.json vuln-e2e.json
